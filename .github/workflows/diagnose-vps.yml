name: Diagnose VPS
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: [self-hosted, linux, x64, vps]
    steps:
      - name: Check Disk Space
        run: df -h

      - name: Check Docker Logs (web)
        run: |
          cd /var/www/drwelnes/src
          docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail=100 web

      - name: Check Nginx Logs
        run: |
          sudo tail -n 50 /var/log/nginx/error.log || echo "Cannot read nginx error log"
          sudo tail -n 50 /var/log/nginx/access.log || echo "Cannot read nginx access log"

      - name: Check Uploads Folder Permissions
        run: ls -la /var/www/drwelnes/src/public/uploads
